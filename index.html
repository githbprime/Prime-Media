<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #0F171E; color: white; overflow-x: hidden; }
        .prime-blue { color: #00A8E1; }
        /* This hides the YouTube logo/title for a cleaner look */
        .yt-container { pointer-events: none; } 
    </style>
</head>
<body>
    <div id="app">
        <nav class="flex items-center justify-between px-10 py-4 sticky top-0 z-50 bg-[#0F171E]">
            <div class="flex items-center gap-10">
                <h1 class="prime-blue text-3xl font-bold tracking-tighter">prime video</h1>
                <div class="flex gap-6 text-gray-400">
                    <button @click="category = 'All'" :class="{'text-white border-b-2': category === 'All'}">All</button>
                    <button @click="category = 'Movies'" :class="{'text-white border-b-2': category === 'Movies'}">Movies</button>
                </div>
            </div>
            <input v-model="searchTerm" type="text" placeholder="Search..." class="bg-[#1A242F] border border-[#33373D] rounded px-4 py-1 w-64 focus:outline-none focus:border-[#00A8E1]">
        </nav>

        <div v-if="!searchTerm" class="relative h-[80vh] w-full bg-black">
            <div class="absolute inset-0 yt-container">
                <iframe 
                    v-if="heroReady"
                    class="w-full h-full scale-125" 
                    :src="`https://www.youtube.com/embed/${movies[0].youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${movies[0].youtubeId}&showinfo=0&rel=0`" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media">
                </iframe>
                <img v-else :src="movies[0].thumbnail" class="w-full h-full object-cover opacity-50">
                <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-transparent to-transparent"></div>
            </div>
            
            <div class="relative z-10 px-10 flex flex-col justify-center h-full max-w-2xl">
                <h1 class="text-7xl font-black italic mb-4">{{ movies[0].title }}</h1>
                <p class="text-xl text-gray-300 mb-8">{{ movies[0].description }}</p>
                <div class="flex gap-4">
                    <button @click="playMovie(movies[0])" class="bg-[#00A8E1] px-10 py-3 rounded font-bold text-lg hover:bg-opacity-80">▶ Play Now</button>
                </div>
            </div>
        </div>

        <div class="px-10 py-10">
            <h3 class="text-xl font-bold mb-4">Your Library</h3>
            <div class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
                <div v-for="movie in filteredMovies" :key="movie.id" @click="selectedMovie = movie" class="min-w-[300px] aspect-video rounded cursor-pointer transition hover:scale-105">
                    <img :src="movie.thumbnail" class="w-full h-full object-cover rounded shadow-lg">
                </div>
            </div>
        </div>

        <div v-if="selectedMovie" class="bg-[#1A242F] p-10 flex gap-10 border-t-4 border-[#00A8E1] animate-pulse-slow">
            <div class="w-1/2 aspect-video">
                <iframe 
                    class="w-full h-full rounded shadow-2xl" 
                    :src="`https://www.youtube.com/embed/${selectedMovie.youtubeId}?autoplay=1&mute=0`" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="w-1/2 flex flex-col justify-center">
                <h2 class="text-5xl font-bold mb-4">{{ selectedMovie.title }}</h2>
                <p class="text-gray-400 text-lg mb-8">{{ selectedMovie.description }}</p>
                <div class="flex gap-4">
                    <button @click="playMovie(selectedMovie)" class="bg-white text-black px-12 py-3 rounded font-bold">▶ Play Full Movie</button>
                    <button @click="selectedMovie = null" class="text-gray-500">Close</button>
                </div>
            </div>
        </div>

        <div v-if="playingMovie" class="fixed inset-0 bg-black z-[100] flex flex-col">
            <button @click="playingMovie = null" class="absolute top-10 left-10 z-10 text-white font-bold bg-black/50 p-3 rounded-full hover:bg-white hover:text-black">✕ Close Player</button>
            <video controls autoplay class="w-full h-full" :src="playingMovie.videoUrl"></video>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const searchTerm = ref("");
                const category = ref("All");
                const selectedMovie = ref(null);
                const playingMovie = ref(null);
                const heroReady = ref(false);

                const movies = ref([
                    {
                        id: "interstellar",
                        title: "Interstellar",
                        youtubeId: "zSWdZVtXT7E", // THE PART AFTER v= IN THE YOUTUBE URL
                        description: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
                        thumbnail: "https://www.hdwallpapers.net/previews/interstellar-474.jpg",
                        videoUrl: "https://drive.google.com/uc?export=download&id=YOUR_DRIVE_ID"
                    }
                ]);

                const filteredMovies = computed(() => {
                    return movies.value.filter(m => m.title.toLowerCase().includes(searchTerm.value.toLowerCase()));
                });

                const playMovie = (movie) => { playingMovie.value = movie; };

                onMounted(() => {
                    setTimeout(() => { heroReady.value = true; }, 3000);
                });

                return { searchTerm, category, selectedMovie, playingMovie, movies, filteredMovies, playMovie, heroReady };
            }
        }).mount('#app');
    </script>
</body>
</html>
