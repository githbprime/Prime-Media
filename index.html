<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #0F171E; color: white; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* YouTube Cinematic Scaling */
        .yt-hero-frame {
            width: 100vw; height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.35);
            pointer-events: none;
        }

        /* Prime Detail Overlay Animation */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="flex items-center justify-between px-10 py-4 fixed w-full z-[60] transition-colors duration-300" 
             :class="{'bg-[#0F171E]': isScrolled, 'bg-gradient-to-b from-black/80 to-transparent': !isScrolled}">
            <div class="flex items-center gap-10">
                <h1 class="text-[#00A8E1] text-2xl font-bold tracking-tighter cursor-pointer" @click="resetView">prime video</h1>
                <div class="flex gap-6 text-gray-300 font-medium text-sm">
                    <button @click="activeTab = 'All'" :class="{'text-white font-bold': activeTab === 'All'}">All</button>
                    <button @click="activeTab = 'Movies'" :class="{'text-white font-bold': activeTab === 'Movies'}">Movies</button>
                    <button @click="activeTab = 'TV Shows'" :class="{'text-white font-bold': activeTab === 'TV Shows'}">TV Shows</button>
                </div>
            </div>
            <input v-model="searchTerm" type="text" placeholder="Search..." class="bg-[#1A242F] border border-[#33373D] rounded px-4 py-1.5 w-64 focus:outline-none focus:border-[#00A8E1] text-sm">
        </nav>

        <div v-if="!searchTerm && activeTab === 'All'" class="relative h-[85vh] w-full bg-black overflow-hidden">
            <div class="absolute inset-0">
                <iframe v-if="heroReady" class="yt-hero-frame"
                    :src="`https://www.youtube.com/embed/${movies[0].youtubeId}?autoplay=1&mute=${heroMuted ? 1 : 0}&controls=0&loop=1&playlist=${movies[0].youtubeId}&modestbranding=1&rel=0&iv_load_policy=3&enablejsapi=1`"
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
                <img v-else :src="movies[0].thumbnail" class="w-full h-full object-cover opacity-50">
            </div>

            <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-[#0F171E]/30 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#0F171E] via-transparent to-transparent"></div>

            <div class="relative z-10 px-12 flex flex-col justify-center h-full max-w-2xl">
                <h1 class="text-7xl font-black italic mb-4 drop-shadow-2xl">{{ movies[0].title }}</h1>
                <p class="text-xl text-gray-200 mb-8 leading-relaxed drop-shadow-md">{{ movies[0].description }}</p>
                <div class="flex items-center gap-4">
                    <button @click="playFullMovie(movies[0])" class="bg-[#00A8E1] px-12 py-3 rounded font-bold text-lg hover:bg-[#008dbd] transition shadow-lg">▶ Play Now</button>
                    <button @click="selectedMovie = movies[0]" class="bg-gray-500/30 hover:bg-gray-500/50 px-6 py-3 rounded font-bold text-lg backdrop-blur-md">Details</button>
                    <button @click="heroMuted = !heroMuted" class="ml-4 bg-white/10 p-3 rounded-full hover:bg-white/20 transition">
                        {{ heroMuted ? '🔇' : '🔊' }}
                    </button>
                </div>
            </div>
        </div>

        <div class="px-12 py-12 relative z-10" :class="{'mt-0': searchTerm}">
            <h3 class="text-xl font-bold mb-6 text-gray-100">{{ searchTerm ? 'Search Results' : 'Recommended for you' }}</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
                <div v-for="movie in filteredMovies" :key="movie.id" @click="selectedMovie = movie" class="group cursor-pointer">
                    <div class="aspect-video overflow-hidden rounded-md border-2 border-transparent group-hover:border-white transition-all duration-300 shadow-md">
                        <img :src="movie.thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <p class="mt-3 text-sm font-bold text-gray-400 group-hover:text-white transition-colors truncate">{{ movie.title }}</p>
                </div>
            </div>
        </div>

        <transition name="fade">
            <div v-if="selectedMovie" class="fixed inset-0 z-[100] bg-[#0F171E] flex flex-col overflow-y-auto">
                <button @click="selectedMovie = null" class="absolute top-8 right-12 z-[110] text-4xl hover:text-[#00A8E1] transition">✕</button>

                <div class="relative w-full h-[65vh] flex-shrink-0">
                    <iframe class="absolute inset-0 w-full h-full"
                        :src="`https://www.youtube.com/embed/${selectedMovie.youtubeId}?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0`"
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0F171E] via-transparent to-transparent"></div>
                </div>

                <div class="px-20 py-10 max-w-5xl">
                    <h2 class="text-6xl font-black italic mb-6">{{ selectedMovie.title }}</h2>
                    <div class="flex items-center gap-6 text-gray-400 mb-8 font-bold">
                        <span class="text-[#00A8E1]">98% Match</span>
                        <span>2014</span>
                        <span class="border border-gray-600 px-2 py-0.5 text-xs">13+</span>
                        <span>2h 49m</span>
                    </div>
                    <p class="text-2xl text-gray-300 leading-relaxed mb-10">{{ selectedMovie.description }}</p>
                    <div class="flex gap-6">
                        <button @click="playFullMovie(selectedMovie)" class="bg-white text-black px-16 py-4 rounded font-black text-xl hover:bg-gray-200 transition">▶ WATCH NOW</button>
                        <button class="bg-gray-700/50 p-4 rounded-full text-2xl hover:bg-gray-600">+</button>
                    </div>
                </div>
            </div>
        </transition>

        <div v-if="playingMovie" class="fixed inset-0 bg-black z-[200] flex flex-col">
            <div class="absolute top-10 left-10 z-[210] flex items-center gap-6">
                <button @click="closePlayer" class="bg-black/50 p-4 rounded-full text-2xl hover:bg-white hover:text-black transition">✕</button>
                <h2 class="text-2xl font-bold">{{ playingMovie.title }}</h2>
            </div>
            <video ref="videoRef" :src="playingMovie.videoUrl" controls autoplay class="w-full h-full"></video>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const searchTerm = ref("");
                const activeTab = ref("All");
                const selectedMovie = ref(null);
                const playingMovie = ref(null);
                const heroReady = ref(false);
                const heroMuted = ref(true);
                const isScrolled = ref(false);
                const videoRef = ref(null);

                const movies = ref([
                    {
                        id: "interstellar",
                        title: "Interstellar",
                        type: "Movies",
                        youtubeId: "3WzHXI5HizQ",
                        description: "In a future where Earth is becoming uninhabitable, a group of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
                        thumbnail: "https://www.hdwallpapers.net/previews/interstellar-474.jpg",
                        videoUrl: "https://drive.google.com/uc?export=download&id=YOUR_DRIVE_ID"
                    },
                    {
                        id: "the-boys",
                        title: "The Boys",
                        type: "TV Shows",
                        youtubeId: "M1bhOaLv4FU",
                        description: "Corrupt superheroes abuse their powers. A group of vigilantes decide to take them down.",
                        thumbnail: "https://images7.alphacoders.com/102/1029241.jpg",
                        videoUrl: "YOUR_DRIVE_LINK"
                    }
                ]);

                const filteredMovies = computed(() => {
                    return movies.value.filter(m => {
                        const matchesSearch = m.title.toLowerCase().includes(searchTerm.value.toLowerCase());
                        const matchesTab = activeTab.value === "All" || m.type === activeTab.value;
                        return matchesSearch && matchesTab;
                    });
                });

                const playFullMovie = (movie) => {
                    playingMovie.value = movie;
                    selectedMovie.value = null;
                    setTimeout(() => {
                        const saved = localStorage.getItem(`time-${movie.id}`);
                        if (saved && videoRef.value) videoRef.value.currentTime = saved;
                    }, 300);
                };

                const closePlayer = () => {
                    if (videoRef.value) localStorage.setItem(`time-${playingMovie.value.id}`, videoRef.value.currentTime);
                    playingMovie.value = null;
                };

                const handleScroll = () => { isScrolled.value = window.scrollY > 50; };

                onMounted(() => {
                    setTimeout(() => heroReady.value = true, 3000);
                    window.addEventListener('scroll', handleScroll);
                });

                return { searchTerm, activeTab, selectedMovie, playingMovie, movies, filteredMovies, playFullMovie, closePlayer, heroReady, heroMuted, isScrolled, videoRef };
            }
        }).mount('#app');
    </script>
</body>
</html>
