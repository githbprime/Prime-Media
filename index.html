<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #0F171E; color: white; scroll-behavior: smooth; font-family: 'Segoe UI', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .prime-blue { color: #00A8E1; }
        .bg-prime-dark { background-color: #1A242F; }
        /* Scale YouTube to hide branding */
        .yt-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .yt-wrapper iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.3); }
    </style>
</head>
<body>
    <div id="app">
        <nav class="flex items-center justify-between px-10 py-4 sticky top-0 z-50 bg-[#0F171E] shadow-xl">
            <div class="flex items-center gap-10">
                <h1 class="prime-blue text-2xl font-bold tracking-tighter cursor-pointer" @click="resetFilters">prime video</h1>
                <div class="flex gap-6 text-gray-400 font-medium text-sm">
                    <button @click="activeTab = 'All'" :class="{'text-white border-b-2 border-white': activeTab === 'All'}">All</button>
                    <button @click="activeTab = 'Movies'" :class="{'text-white border-b-2 border-white': activeTab === 'Movies'}">Movies</button>
                    <button @click="activeTab = 'TV Shows'" :class="{'text-white border-b-2 border-white': activeTab === 'TV Shows'}">TV Shows</button>
                </div>
            </div>
            <div class="relative">
                <input 
                    v-model="searchTerm" 
                    type="text" 
                    placeholder="Search..." 
                    class="bg-[#1A242F] border border-[#33373D] rounded px-4 py-1.5 w-64 focus:outline-none focus:border-[#00A8E1] text-sm"
                >
            </div>
        </nav>

        <div v-if="!searchTerm && activeTab === 'All'" class="relative h-[75vh] w-full overflow-hidden bg-black">
            <div class="yt-wrapper">
                <iframe 
                    v-if="heroReady"
                    :src="`https://www.youtube.com/embed/${movies[0].youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${movies[0].youtubeId}&rel=0&iv_load_policy=3`" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media">
                </iframe>
                <img v-else :src="movies[0].thumbnail" class="w-full h-full object-cover opacity-50">
            </div>
            <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-[#0F171E]/40 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#0F171E] via-transparent to-transparent"></div>
            
            <div class="relative z-10 px-12 flex flex-col justify-center h-full max-w-2xl">
                <h1 class="text-6xl font-black italic mb-4">{{ movies[0].title }}</h1>
                <p class="text-lg text-gray-200 mb-8 leading-relaxed">{{ movies[0].description }}</p>
                <button @click="playFullMovie(movies[0])" class="bg-[#00A8E1] w-fit px-12 py-3 rounded font-bold text-lg hover:bg-opacity-90 transition">
                    ▶ Play Now
                </button>
            </div>
        </div>

        <div class="px-10 py-10">
            <h3 class="text-lg font-bold mb-6 text-gray-300">{{ activeTab === 'All' ? 'Your Library' : activeTab }}</h3>
            
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                <div 
                    v-for="movie in filteredMovies" 
                    :key="movie.id"
                    @click="selectedMovie = movie"
                    class="group cursor-pointer"
                >
                    <div class="aspect-video overflow-hidden rounded-md border border-transparent group-hover:border-white transition-all duration-300">
                        <img :src="movie.thumbnail" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <p class="mt-2 text-xs font-semibold text-gray-400 group-hover:text-white truncate">
                        {{ movie.title }}
                    </p>
                </div>
            </div>
        </div>

        <div v-if="selectedMovie" class="fixed inset-x-0 bottom-0 z-50 bg-[#1A242F] p-10 flex gap-10 border-t-4 border-[#00A8E1] animate-slide-up shadow-2xl">
            <div class="w-1/2 aspect-video relative rounded-lg overflow-hidden shadow-2xl">
                <iframe 
                    class="w-full h-full" 
                    :src="`https://www.youtube.com/embed/${selectedMovie.youtubeId}?autoplay=1&mute=0&rel=0`" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="w-1/2 flex flex-col justify-center">
                <h2 class="text-5xl font-bold mb-2">{{ selectedMovie.title }}</h2>
                <p class="text-gray-400 text-lg mb-8 max-w-xl">{{ selectedMovie.description }}</p>
                <div class="flex gap-4">
                    <button @click="playFullMovie(selectedMovie)" class="bg-white text-black px-12 py-3 rounded font-bold hover:bg-gray-200 transition">
                        ▶ Play Full Movie
                    </button>
                    <button @click="selectedMovie = null" class="text-gray-500 hover:text-white font-medium">✕ Close Details</button>
                </div>
            </div>
        </div>

        <div v-if="playingMovie" class="fixed inset-0 bg-black z-[100] flex flex-col">
            <div class="absolute top-8 left-8 z-10 flex items-center gap-4">
                <button @click="closePlayer" class="bg-black/50 p-3 rounded-full hover:bg-white hover:text-black transition">✕</button>
                <span class="font-bold text-xl">{{ playingMovie.title }}</span>
            </div>
            <video 
                ref="videoRef" 
                :src="playingMovie.videoUrl" 
                controls 
                autoplay 
                class="w-full h-full"
            ></video>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const searchTerm = ref("");
                const activeTab = ref("All");
                const selectedMovie = ref(null);
                const playingMovie = ref(null);
                const heroReady = ref(false);
                const videoRef = ref(null);

                // --- DATA ---
                // Add your movies here. Make sure "type" matches your Tabs.
                const movies = ref([
                    {
                        id: "interstellar",
                        title: "Interstellar",
                        type: "Movies",
                        youtubeId: "3WzHXI5HizQ", // Fix: Make sure this is just the ID
                        description: "When Earth becomes uninhabitable, a farmer and ex-pilot is tasked to pilot a spacecraft, along with a team of researchers, to find a new planet for humans.",
                        thumbnail: "https://www.hdwallpapers.net/previews/interstellar-474.jpg",
                        videoUrl: "https://drive.google.com/uc?export=download&id=YOUR_DRIVE_FILE_ID"
                    },
                    {
                        id: "the-boys",
                        title: "The Boys",
                        type: "TV Shows",
                        youtubeId: "M1bhOaLv4FU",
                        description: "A group of vigilantes set out to take down corrupt superheroes who abuse their superpowers.",
                        thumbnail: "https://images7.alphacoders.com/102/1029241.jpg",
                        videoUrl: "YOUR_DIRECT_VIDEO_LINK"
                    }
                ]);

                // --- FILTER LOGIC ---
                const filteredMovies = computed(() => {
                    return movies.value.filter(m => {
                        const matchesSearch = m.title.toLowerCase().includes(searchTerm.value.toLowerCase());
                        const matchesTab = activeTab.value === "All" || m.type === activeTab.value;
                        return matchesSearch && matchesTab;
                    });
                });

                // --- PLAYER LOGIC ---
                const playFullMovie = (movie) => {
                    playingMovie.value = movie;
                    // Auto-resume from local storage timestamp
                    setTimeout(() => {
                        const saved = localStorage.getItem(`timestamp-${movie.id}`);
                        if (saved && videoRef.value) {
                            videoRef.value.currentTime = parseFloat(saved);
                        }
                    }, 200);
                };

                const closePlayer = () => {
                    if (videoRef.value) {
                        localStorage.setItem(`timestamp-${playingMovie.value.id}`, videoRef.value.currentTime);
                    }
                    playingMovie.value = null;
                };

                const resetFilters = () => {
                    activeTab.value = 'All';
                    searchTerm.value = '';
                };

                onMounted(() => {
                    setTimeout(() => { heroReady.value = true; }, 3000);
                });

                return { 
                    searchTerm, activeTab, selectedMovie, playingMovie, 
                    movies, filteredMovies, playFullMovie, closePlayer, 
                    heroReady, videoRef, resetFilters 
                };
            }
        }).mount('#app');
    </script>

    <style>
        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slide-up 0.4s ease-out forwards; }
    </style>
</body>
</html>
