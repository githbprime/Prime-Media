<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        html, body { 
            background-color: #0F171E; 
            color: white; 
            overflow-x: hidden; 
            width: 100%; 
            max-width: 100%; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .yt-hero-frame {
            width: 100%; height: 56.25vw; 
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.35);
            pointer-events: none;
        }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.4s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="app" class="w-full overflow-hidden">
        <nav class="flex items-center justify-between px-10 py-4 fixed w-full z-[60] transition-colors duration-300" 
             :class="{'bg-[#0F171E]': isScrolled, 'bg-gradient-to-b from-black/80 to-transparent': !isScrolled}">
            <div class="flex items-center gap-10">
                <h1 class="text-[#00A8E1] text-2xl font-bold tracking-tighter cursor-pointer" @click="resetView">prime video</h1>
                <div class="flex gap-6 text-gray-300 font-medium text-sm">
                    <button @click="activeTab = 'All'" :class="{'text-white font-bold': activeTab === 'All'}">All</button>
                    <button @click="activeTab = 'Movies'" :class="{'text-white font-bold': activeTab === 'Movies'}">Movies</button>
                    <button @click="activeTab = 'TV Shows'" :class="{'text-white font-bold': activeTab === 'TV Shows'}">TV Shows</button>
                </div>
            </div>
            <input v-model="searchTerm" type="text" placeholder="Search..." class="bg-[#1A242F] border border-[#33373D] rounded px-4 py-1.5 w-64 focus:outline-none focus:border-[#00A8E1] text-sm hidden md:block">
        </nav>

        <div v-if="!searchTerm && activeTab === 'All'" class="relative h-[85vh] w-full bg-black overflow-hidden">
            <div class="absolute inset-0">
                <iframe v-if="heroReady && !selectedMovie && !playingMovie && !playingTrailer" class="yt-hero-frame"
                    :src="`https://www.youtube.com/embed/${movies[0].youtubeId}?autoplay=1&mute=${heroMuted ? 1 : 0}&controls=0&loop=1&playlist=${movies[0].youtubeId}&modestbranding=1&rel=0&iv_load_policy=3&enablejsapi=1`"
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
                <img v-else :src="movies[0].thumbnail" class="w-full h-full object-cover opacity-50">
            </div>

            <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-[#0F171E]/40 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#0F171E] via-transparent to-transparent"></div>

            <div class="relative z-10 px-10 md:px-16 flex flex-col justify-center h-full max-w-3xl">
                <h1 class="text-6xl md:text-7xl font-black italic mb-4 drop-shadow-2xl">{{ movies[0].title }}</h1>
                <p class="text-lg md:text-xl text-gray-200 mb-8 leading-relaxed drop-shadow-md">{{ movies[0].description }}</p>
                <div class="flex flex-wrap items-center gap-4">
                    <button @click="playFullMovie(movies[0])" class="bg-[#00A8E1] px-12 py-3 rounded font-bold text-lg hover:bg-[#008dbd] transition shadow-lg">▶ Play Now</button>
                    <button @click="selectedMovie = movies[0]" class="bg-gray-500/30 hover:bg-gray-500/50 px-6 py-3 rounded font-bold text-lg backdrop-blur-md">Details</button>
                    <button @click="heroMuted = !heroMuted" class="ml-2 bg-white/10 p-3 rounded-full hover:bg-white/20 transition">
                        {{ heroMuted ? '🔇' : '🔊' }}
                    </button>
                </div>
            </div>
        </div>

        <div class="px-10 md:px-16 py-12 relative z-10 w-full" :class="{'mt-0': searchTerm}">
            <h3 class="text-xl font-bold mb-6 text-gray-100">{{ searchTerm ? 'Search Results' : 'Recommended for you' }}</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
                <div v-for="movie in filteredMovies" :key="movie.id" @click="selectedMovie = movie" class="group cursor-pointer">
                    <div class="aspect-video overflow-hidden rounded-md border-2 border-transparent group-hover:border-white transition-all duration-300 shadow-md">
                        <img :src="movie.thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <p class="mt-3 text-sm font-bold text-gray-400 group-hover:text-white transition-colors truncate">{{ movie.title }}</p>
                </div>
            </div>
        </div>

        <transition name="fade">
            <div v-if="selectedMovie" class="fixed inset-0 z-[100] bg-[#0F171E] overflow-y-auto overflow-x-hidden w-full h-full">
                <button @click="selectedMovie = null" class="absolute top-6 right-8 md:top-8 md:right-12 z-[110] text-4xl text-white/50 hover:text-white transition">✕</button>

                <div class="relative w-full h-[50vh] md:h-[65vh] flex-shrink-0 bg-black">
                    <img :src="selectedMovie.thumbnail" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0F171E] via-[#0F171E]/50 to-transparent"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-[#0F171E]/20 to-transparent"></div>
                </div>

                <div class="px-8 md:px-20 pb-20 max-w-5xl relative z-10 -mt-24 md:-mt-32">
                    <h2 class="text-5xl md:text-6xl font-black italic mb-6 drop-shadow-xl">{{ selectedMovie.title }}</h2>
                    <div class="flex flex-wrap items-center gap-4 md:gap-6 text-gray-400 mb-8 font-bold text-sm md:text-base">
                        <span class="text-[#00A8E1]">98% Match</span>
                        <span>2014</span>
                        <span class="border border-gray-600 px-2 py-0.5 text-xs text-white">13+</span>
                        <span>2h 49m</span>
                    </div>
                    <p class="text-lg md:text-xl text-gray-300 leading-relaxed mb-10 md:w-3/4">{{ selectedMovie.description }}</p>
                    
                    <div class="flex flex-col gap-4 w-full md:w-[450px]">
                        <button @click="playFullMovie(selectedMovie)" class="w-full flex justify-center items-center bg-white text-black px-6 py-4 rounded font-black text-xl hover:bg-gray-200 transition shadow-lg">
                            ▶ WATCH NOW
                        </button>
                        <button @click="playTrailerFullScreen(selectedMovie)" class="w-full flex justify-center items-center bg-gray-700/60 text-white px-6 py-4 rounded font-black text-xl hover:bg-gray-600 transition backdrop-blur-md border border-gray-500/30">
                            🎬 WATCH TRAILER
                        </button>
                    </div>
                </div>
            </div>
        </transition>

        <div v-if="playingMovie || playingTrailer" class="fixed inset-0 bg-black z-[200] flex flex-col w-full h-full group">
            
            <video v-if="playingMovie" ref="videoRef" :src="playingMovie.videoUrl" controls autoplay class="w-full h-full object-contain"></video>
            
            <div v-if="playingTrailer" class="relative w-full h-full flex flex-col justify-center bg-black">
                
                <div class="absolute inset-0 z-[205]" @click="toggleTrailerPlay"></div>

                <iframe id="yt-trailer-iframe" class="absolute inset-0 w-full h-full z-[200] pointer-events-none" 
                    :src="`https://www.youtube.com/embed/${playingTrailer.youtubeId}?autoplay=1&mute=0&controls=0&disablekb=1&modestbranding=1&rel=0&enablejsapi=1`" 
                    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                </iframe>

                <div class="absolute inset-0 z-[210] flex flex-col justify-between opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                    
                    <div class="w-full bg-gradient-to-b from-black/80 to-transparent p-8 flex items-center justify-between pointer-events-auto">
                        <h2 class="text-2xl font-bold drop-shadow-md">{{ playingTrailer.title }} (Trailer)</h2>
                        <button @click="closePlayer" class="text-white hover:text-[#00A8E1] transition text-4xl">✕</button>
                    </div>

                    <div class="w-full bg-gradient-to-t from-black/90 to-transparent p-8 flex items-center gap-6 pointer-events-auto">
                        <button @click="toggleTrailerPlay" class="text-4xl text-white hover:text-[#00A8E1] transition">
                            {{ isTrailerPaused ? '▶' : '⏸' }}
                        </button>
                        <div class="flex-grow h-1.5 bg-gray-600 rounded-full overflow-hidden">
                            <div class="h-full bg-[#00A8E1] w-1/3 animate-pulse"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button v-if="playingMovie" @click="closePlayer" class="absolute top-6 left-6 md:top-10 md:left-10 z-[210] bg-black/60 backdrop-blur-sm p-3 md:p-4 rounded-full text-xl md:text-2xl hover:bg-white hover:text-black transition">✕</button>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const searchTerm = ref("");
                const activeTab = ref("All");
                const selectedMovie = ref(null);
                const playingMovie = ref(null);
                const playingTrailer = ref(null);
                const isTrailerPaused = ref(false);
                const heroReady = ref(false);
                const heroMuted = ref(true);
                const isScrolled = ref(false);
                const videoRef = ref(null);

                const movies = ref([
                    {
                        id: "interstellar",
                        title: "Interstellar",
                        type: "Movies",
                        youtubeId: "3WzHXI5HizQ",
                        description: "In a future where Earth is becoming uninhabitable, a group of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
                        thumbnail: "https://www.hdwallpapers.net/previews/interstellar-474.jpg",
                        videoUrl: "https://drive.google.com/uc?export=download&id=YOUR_DRIVE_ID"
                    }
                ]);

                const filteredMovies = computed(() => {
                    return movies.value.filter(m => {
                        const matchesSearch = m.title.toLowerCase().includes(searchTerm.value.toLowerCase());
                        const matchesTab = activeTab.value === "All" || m.type === activeTab.value;
                        return matchesSearch && matchesTab;
                    });
                });

                const playFullMovie = (movie) => {
                    playingMovie.value = movie;
                    setTimeout(() => {
                        const saved = localStorage.getItem(`time-${movie.id}`);
                        if (saved && videoRef.value) videoRef.value.currentTime = saved;
                    }, 300);
                };

                const playTrailerFullScreen = (movie) => { 
                    playingTrailer.value = movie; 
                    isTrailerPaused.value = false;
                };

                // Uses YouTube's postMessage API to control the iframe behind our custom UI
                const toggleTrailerPlay = () => {
                    isTrailerPaused.value = !isTrailerPaused.value;
                    const iframe = document.getElementById('yt-trailer-iframe');
                    if (iframe && iframe.contentWindow) {
                        const command = isTrailerPaused.value ? 'pauseVideo' : 'playVideo';
                        iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: command, args: [] }), '*');
                    }
                };

                const closePlayer = () => {
                    if (playingMovie.value && videoRef.value) {
                        localStorage.setItem(`time-${playingMovie.value.id}`, videoRef.value.currentTime);
                    }
                    playingMovie.value = null;
                    playingTrailer.value = null;
                };

                const resetView = () => {
                    activeTab.value = 'All';
                    searchTerm.value = '';
                    selectedMovie.value = null;
                };

                const handleScroll = () => { isScrolled.value = window.scrollY > 20; };

                onMounted(() => {
                    setTimeout(() => heroReady.value = true, 3000);
                    window.addEventListener('scroll', handleScroll);
                });

                return { 
                    searchTerm, activeTab, selectedMovie, playingMovie, playingTrailer, isTrailerPaused,
                    movies, filteredMovies, playFullMovie, playTrailerFullScreen, toggleTrailerPlay, closePlayer, 
                    resetView, heroReady, heroMuted, isScrolled, videoRef 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
