<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #0F171E; color: white; scroll-behavior: smooth; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .prime-blue { color: #00A8E1; }
        .bg-prime-dark { background-color: #1A242F; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="flex items-center justify-between px-10 py-4 sticky top-0 z-50 bg-[#0F171E]">
            <div class="flex items-center gap-10">
                <h1 class="prime-blue text-3xl font-bold tracking-tighter">prime video</h1>
                <div class="flex gap-6 text-gray-400 font-medium">
                    <button @click="category = 'All'" :class="{'text-white border-b-2': category === 'All'}">All</button>
                    <button @click="category = 'Movies'" :class="{'text-white border-b-2': category === 'Movies'}">Movies</button>
                    <button @click="category = 'TV Shows'" :class="{'text-white border-b-2': category === 'TV Shows'}">TV Shows</button>
                </div>
            </div>
            <input 
                v-model="searchTerm" 
                type="text" 
                placeholder="Search..." 
                class="bg-[#1A242F] border border-[#33373D] rounded px-4 py-1 w-64 focus:outline-none focus:border-[#00A8E1]"
            >
        </nav>

        <div v-if="!searchTerm && category === 'All'" class="relative h-[70vh] w-full overflow-hidden">
            <div class="absolute inset-0">
                <video v-if="heroReady" :src="movies[0].trailer" autoplay muted loop class="w-full h-full object-cover opacity-60"></video>
                <img v-else :src="movies[0].thumbnail" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-r from-[#0F171E] via-transparent to-transparent"></div>
            </div>
            <div class="relative z-10 px-10 flex flex-col justify-center h-full max-w-2xl">
                <h1 class="text-6xl font-black italic mb-4">{{ movies[0].title }}</h1>
                <p class="text-xl text-gray-300 mb-8">{{ movies[0].description }}</p>
                <button @click="playMovie(movies[0])" class="bg-[#00A8E1] w-fit px-10 py-3 rounded font-bold text-lg">▶ Play Now</button>
            </div>
        </div>

        <div class="px-10 py-8">
            <h3 class="text-xl font-bold mb-4">Recommended for you</h3>
            <div class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
                <div 
                    v-for="movie in filteredMovies" 
                    :key="movie.id"
                    @click="selectedMovie = movie"
                    class="min-w-[300px] aspect-video rounded cursor-pointer transition-transform hover:scale-105"
                >
                    <img :src="movie.thumbnail" class="w-full h-full object-cover rounded shadow-lg">
                </div>
            </div>
        </div>

        <div v-if="selectedMovie" class="bg-prime-dark w-full p-10 flex gap-10 border-t-4 border-[#00A8E1] mt-4">
            <div class="w-1/2">
                <video :src="selectedMovie.trailer" autoplay muted loop class="w-full rounded shadow-2xl"></video>
            </div>
            <div class="w-1/2 flex flex-col justify-center">
                <h2 class="text-5xl font-bold mb-2">{{ selectedMovie.title }}</h2>
                <p class="text-gray-400 text-lg mb-8">{{ selectedMovie.description }}</p>
                <div class="flex gap-4">
                    <button @click="playMovie(selectedMovie)" class="bg-white text-black px-12 py-3 rounded font-bold">▶ Play</button>
                    <button @click="selectedMovie = null" class="text-gray-500">Close</button>
                </div>
            </div>
        </div>

        <div v-if="playingMovie" class="fixed inset-0 bg-black z-[100] flex flex-col">
            <button @click="closePlayer" class="absolute top-10 left-10 z-10 text-white font-bold bg-black/50 p-3 rounded-full">✕ Back</button>
            <video 
                ref="videoPlayer" 
                :src="playingMovie.videoUrl" 
                controls 
                autoplay 
                class="w-full h-full"
            ></video>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const searchTerm = ref("");
                const category = ref("All");
                const selectedMovie = ref(null);
                const playingMovie = ref(null);
                const heroReady = ref(false);
                const videoPlayer = ref(null);

                // --- DATA ---
                const movies = ref([
                    {
                        id: "interstellar",
                        title: "Interstellar",
                        category: "Movies",
                        description: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
                        thumbnail: "https://images.alphacoders.com/541/541132.jpg",
                        trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
                        videoUrl: "https://drive.google.com/uc?export=download&id=YOUR_DRIVE_ID"
                    }
                ]);

                // --- LOGIC ---
                const filteredMovies = computed(() => {
                    return movies.value.filter(m => 
                        m.title.toLowerCase().includes(searchTerm.value.toLowerCase()) &&
                        (category.value === "All" || m.category === category.value)
                    );
                });

                const playMovie = (movie) => {
                    playingMovie.value = movie;
                    // Auto-resume from local storage
                    setTimeout(() => {
                        const savedTime = localStorage.getItem(`time-${movie.id}`);
                        if (savedTime && videoPlayer.value) {
                            videoPlayer.value.currentTime = savedTime;
                        }
                    }, 100);
                };

                const closePlayer = () => {
                    // Save progress before closing
                    if (videoPlayer.value) {
                        localStorage.setItem(`time-${playingMovie.value.id}`, videoPlayer.value.currentTime);
                    }
                    playingMovie.value = null;
                };

                onMounted(() => {
                    // Start hero trailer after 3 seconds
                    setTimeout(() => { heroReady.value = true; }, 3000);
                });

                return { searchTerm, category, selectedMovie, playingMovie, movies, filteredMovies, playMovie, closePlayer, heroReady, videoPlayer };
            }
        }).mount('#app');
    </script>
</body>
</html>
